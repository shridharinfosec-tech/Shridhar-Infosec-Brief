<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shridhar InfoSec — Podcast Reference Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --accent: #2563eb;
  --accent-bg: #eff6ff;
  --accent-border: #bfdbfe;
  --green: #10b981;
  --green-bg: #ecfdf5;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
  --r: 12px;
  --r-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{border:none;cursor:pointer;font-family:'Inter',sans-serif;background:none}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:10px}

/* Layout */
#app{display:flex;min-height:100vh}

/* Sidebar */
#sidebar{
  width:240px;flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);
  position:sticky;top:0;height:100vh;overflow-y:auto;
  display:flex;flex-direction:column;z-index:50;
}
.sb-brand{padding:20px;border-bottom:1px solid var(--border-light)}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sb-logo-icon{
  width:34px;height:34px;background:#1e40af;border-radius:8px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sb-logo-icon i{font-size:17px;color:#fff}
.sb-logo-text{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
.sb-logo-img{width:100%;max-width:180px;height:auto;object-fit:contain;display:block}
.sb-tagline{font-size:11px;color:var(--text3);line-height:1.5;margin-top:10px}

.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-nav-label{padding:6px 12px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em}
.nav-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;transition:all 0.15s;
  text-align:left;margin-bottom:2px;
}
.nav-btn:hover{background:var(--bg)}
.nav-btn.active{background:var(--accent-bg)}
.nav-num{font-size:10px;font-weight:600;color:var(--text3);font-variant-numeric:tabular-nums;width:18px;flex-shrink:0}
.nav-btn.active .nav-num{color:var(--accent)}
.nav-label{font-size:13px;color:var(--text2);font-weight:400}
.nav-btn.active .nav-label{color:var(--accent);font-weight:600}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-left:auto;flex-shrink:0}

.sb-footer{padding:14px;border-top:1px solid var(--border-light)}
.sb-prepared{
  background:var(--bg);border:1px solid var(--border-light);
  border-radius:10px;padding:14px;
}
.sb-prepared-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.sb-prepared-name{font-size:13px;font-weight:600;color:var(--text)}
.sb-prepared-show{font-size:12px;color:var(--text3);margin-top:2px}

/* Main area */
#main{flex:1;min-width:0;display:flex;flex-direction:column}

/* Top bar (mobile) */
#topbar{
  display:none;position:sticky;top:0;z-index:40;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 16px;height:56px;align-items:center;justify-content:space-between;
}
.tb-brand{display:flex;align-items:center;gap:8px}
.tb-logo-icon{width:28px;height:28px;background:#1e40af;border-radius:6px;display:flex;align-items:center;justify-content:center}
.tb-logo-icon i{font-size:14px;color:#fff}
.tb-title{font-size:13px;font-weight:700;color:var(--text)}
.tb-menu{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1px solid var(--border)}
.tb-menu i{font-size:18px;color:var(--text2)}

/* Mobile sidebar overlay */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:45;backdrop-filter:blur(2px)}

/* Content */
#content-area{flex:1;overflow-y:auto}
#content{max-width:820px;margin:0 auto;padding:48px 36px 100px}

/* Section animation */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.section-enter{animation:fadeUp 0.32s ease forwards}

/* Section header */
.section-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.section-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:100px;padding:5px 12px;
  font-size:11px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.06em;
}
.section-num-label{font-size:11px;font-weight:500;color:var(--text3)}
.section-title{font-size:clamp(30px,4vw,44px);font-weight:800;color:var(--text);letter-spacing:-0.03em;line-height:1.1;margin-bottom:10px}
.section-subtitle{font-size:16px;color:var(--text3);font-weight:400;line-height:1.5}
.section-divider{height:1px;background:linear-gradient(to right, var(--accent-border), var(--border) 40%, transparent);margin:28px 0}

/* Content blocks */
.blocks{display:flex;flex-direction:column;gap:28px}

/* Intro */
.block-intro{padding-left:18px;border-left:2.5px solid var(--accent)}
.block-intro p{font-size:17px;line-height:1.8;color:var(--text2);font-weight:400}

/* Para */
.block-para{font-size:14px;line-height:1.8;color:var(--text3)}

/* Quote */
.block-quote{
  background:var(--accent-bg);border:1px solid var(--accent-border);
  border-radius:var(--r);padding:32px 36px;position:relative;overflow:hidden;
}
.block-quote::before{
  content:'"';font-size:100px;line-height:0;color:var(--accent-border);
  font-family:Georgia,serif;position:absolute;top:44px;left:24px;
}
.block-quote blockquote{
  font-size:19px;font-weight:500;line-height:1.65;color:var(--text);
  padding-top:12px;position:relative;z-index:1;
}
.block-quote cite{display:block;margin-top:16px;font-size:12px;font-weight:600;color:var(--accent);font-style:normal}

/* Label */
.block-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.block-label::before{content:'';display:block;width:6px;height:6px;border-radius:2px;background:var(--accent);flex-shrink:0}

/* Specs table */
.specs-table{border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden}
.spec-row{display:flex;border-bottom:1px solid var(--border-light)}
.spec-row:last-child{border-bottom:none}
.spec-row:nth-child(odd){background:var(--surface)}
.spec-row:nth-child(even){background:#fafbfc}
.spec-key{width:120px;flex-shrink:0;padding:11px 16px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;border-right:1px solid var(--border-light);display:flex;align-items:center}
.spec-val{padding:11px 16px;flex:1;font-size:13px;color:var(--text2);line-height:1.5;display:flex;align-items:center}

/* Panel */
.block-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px}
.block-panel p{font-size:14px;color:var(--text2);line-height:1.8;margin-top:10px}

/* Threat grid */
.threat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.threat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:20px;transition:all 0.2s}
.threat-card:hover{box-shadow:var(--shadow-md);border-color:#cbd5e1;transform:translateY(-1px)}
.threat-code{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.threat-card h4{font-size:14px;font-weight:700;color:var(--text);margin-bottom:7px}
.threat-card p{font-size:13px;color:var(--text2);line-height:1.65}

/* Capability grid */
.cap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
.cap-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:18px;
  transition:all 0.2s;cursor:default;
}
.cap-card:hover{box-shadow:var(--shadow-md);border-color:var(--accent-border);transform:translateY(-2px)}
.cap-icon{
  width:36px;height:36px;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  margin-bottom:12px;font-size:18px;color:#64748b;transition:all 0.2s;
}
.cap-card:hover .cap-icon{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.cap-name{font-size:14px;font-weight:800;color:var(--text);margin-bottom:2px}
.cap-full{font-size:9.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:10px;line-height:1.4}
.cap-desc{font-size:12px;color:var(--text2);line-height:1.6}

/* Status bar */
.status-bar{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:14px 20px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-sm);
}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(16,185,129,0.4)}50%{opacity:.7;box-shadow:0 0 0 6px rgba(16,185,129,0)}}
.status-text{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:0.04em}

/* Protocol steps */
.step{display:flex;gap:18px}
.step-aside{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.step-circle{
  width:40px;height:40px;border-radius:50%;background:var(--surface);
  border:2px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--text3);flex-shrink:0;
}
.step-line{width:1px;flex:1;background:var(--border);margin:5px 0;min-height:20px}
.step-body{flex:1;padding-top:5px;padding-bottom:26px}
.step:last-child .step-body{padding-bottom:0}
.step:last-child .step-line{display:none}
.step-body h4{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
.step-body p{font-size:13px;color:var(--text2);line-height:1.7}

/* Edge grid */
.edge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.edge-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:20px;transition:all 0.2s}
.edge-card:hover{box-shadow:var(--shadow-md);border-color:#cbd5e1;transform:translateY(-1px)}
.edge-icon-wrap{
  width:36px;height:36px;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  margin-bottom:12px;font-size:17px;color:#64748b;
}
.edge-card h4{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px}
.edge-card p{font-size:13px;color:var(--text2);line-height:1.65}

/* Roadmap */
.roadmap-list{display:flex;flex-direction:column;gap:10px}
.roadmap-card{
  display:flex;align-items:stretch;gap:0;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  transition:all 0.2s;
}
.roadmap-card:hover{box-shadow:var(--shadow-md);border-color:var(--accent-border)}
.roadmap-horizon{
  flex-shrink:0;width:90px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:20px 16px;
  background:var(--bg);border-right:1px solid var(--border);text-align:center;
}
.roadmap-t{font-size:24px;font-weight:800;color:#e2e8f0;line-height:1;letter-spacing:-1px}
.roadmap-phase{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:6px;line-height:1.3}
.roadmap-body{padding:18px 22px;flex:1}
.roadmap-body h4{font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px}
.roadmap-body p{font-size:13px;color:var(--text2);line-height:1.65}

/* Segment split */
.segment-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.segment-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:24px;display:flex;flex-direction:column;gap:18px;
}
.segment-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:16px;border-bottom:1px solid var(--border-light)}
.segment-label{font-size:17px;font-weight:800;color:var(--text)}
.segment-tag{display:inline-block;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em}
.segment-headline{font-size:14px;font-weight:600;color:var(--text2);line-height:1.4}
.problems-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.problems-list li{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;color:var(--text2);line-height:1.5}
.problem-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
.mitigation-box{border-radius:8px;padding:14px}
.mitigation-box .block-label{margin-bottom:8px}
.mitigation-box p{font-size:12.5px;color:var(--text2);line-height:1.65}
.outcome-text{font-size:12.5px;color:var(--text2);line-height:1.65;font-style:italic}

/* Manifesto */
.manifesto{
  background:var(--text);border-radius:var(--r);padding:44px 48px;
  text-align:center;position:relative;overflow:hidden;
}
.manifesto::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);
  background-size:20px 20px;
}
.manifesto p{font-size:17px;font-weight:500;color:rgba(255,255,255,0.85);line-height:1.8;max-width:600px;margin:0 auto;position:relative}

/* Navigation footer */
.nav-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:56px;padding-top:24px;border-top:1px solid var(--border);
}
.nav-btn-prev,.nav-btn-next{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 16px;border-radius:8px;font-size:13px;font-weight:500;
  border:1px solid var(--border);transition:all 0.15s;
}
.nav-btn-prev{color:var(--text2);background:var(--surface)}
.nav-btn-prev:hover{background:var(--bg);border-color:#cbd5e1}
.nav-btn-next{color:var(--accent);background:var(--accent-bg);border-color:var(--accent-border)}
.nav-btn-next:hover{background:#dbeafe}
.nav-end{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 16px;border-radius:8px;font-size:13px;color:var(--text3);
  border:1px solid var(--border-light);background:var(--surface);
}
.nav-end i{color:var(--green)}
.progress-dots{display:flex;gap:5px;align-items:center}
.dot{
  height:5px;border-radius:100px;cursor:pointer;
  transition:all 0.25s ease;background:var(--border);width:5px;
}
.dot.active{background:var(--accent);width:20px}
.dot:hover:not(.active){background:#94a3b8}

/* Q&A Accordion */
.qa-domains{display:flex;flex-direction:column;gap:20px}
.qa-domain-hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:10px}
.qa-domain-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.qa-domain-info{flex:1;min-width:0}
.qa-domain-info h3{font-size:14px;font-weight:700;color:var(--text);line-height:1.2}
.qa-domain-info p{font-size:11.5px;color:var(--text3);margin-top:2px}
.qa-domain-tag{padding:3px 10px;border-radius:100px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0}
details.qa-item{border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;margin-bottom:6px;background:var(--surface);transition:border-color 0.2s}
details.qa-item[open]{border-color:#94a3b8}
summary.qa-q{padding:13px 18px;cursor:pointer;list-style:none;display:flex;align-items:flex-start;gap:12px;-webkit-user-select:none;user-select:none}
summary.qa-q::-webkit-details-marker{display:none}
summary.qa-q:hover{background:var(--bg)}
.qa-num{font-size:10px;font-weight:700;color:var(--text3);flex-shrink:0;width:26px;padding-top:2px}
.qa-q-text{flex:1;font-size:13px;font-weight:500;color:var(--text);line-height:1.55}
.qa-icon{font-size:14px;color:var(--text3);flex-shrink:0;margin-top:1px;transition:transform 0.2s}
details.qa-item[open] .qa-icon{transform:rotate(45deg)}
.qa-a{padding:14px 18px 16px 56px;border-top:1px solid var(--border-light);background:#fafbfc}
.qa-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:7px}
.qa-a p{font-size:13px;color:var(--text2);line-height:1.8}

/* Responsive */
@media(max-width:900px){
  #sidebar{
    position:fixed;top:0;left:0;height:100%;
    transform:translateX(-100%);transition:transform 0.25s ease;
    box-shadow:var(--shadow-md);
  }
  #sidebar.open{transform:translateX(0)}
  #overlay{display:block !important;opacity:0;pointer-events:none;transition:opacity 0.25s}
  #overlay.show{opacity:1;pointer-events:all}
  #topbar{display:flex}
  #content{padding:32px 20px 80px}
  .manifesto{padding:32px 24px}
  .block-quote blockquote{font-size:16px}
  .cap-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
}
@media(max-width:520px){
  .section-title{font-size:26px}
  .cap-grid{grid-template-columns:1fr 1fr}
  .segment-grid{grid-template-columns:1fr}
  .edge-grid{grid-template-columns:1fr 1fr}
  .threat-grid{grid-template-columns:1fr}
  .spec-key{width:90px}
}
</style>
</head>
<body>
<div id="app">
  <div id="overlay" onclick="closeMenu()"></div>
  <aside id="sidebar"></aside>
  <div id="main">

              a:"The CERT-In directions are among the most aggressive reporting timelines in the world — you must report specified cyber incidents within six hours of noticing them. That is brutally tight when you are still figuring out what is happening. Technically it demands two things be in place beforehand. First, detection capability to even know an incident occurred quickly — which loops straight back to a functioning SOC, because you cannot report within six hours of an incident you will not discover for six weeks. Second, an incident response plan with the reporting workflow pre-built — who declares an incident, who is authorized to file, the template ready to go — so you are not inventing the process while the clock runs. CERT-In also mandates log retention of a rolling 180 days, and time synchronization so timestamps across systems stay consistent and reliable for investigation. The six-hour rule is a forcing function — it forces organizations to build detection and response maturity in advance."
            }
          ]
        }
      ]}

function h(tag, cls, inner, extra=''){
  return `<${tag} class="${cls}" ${extra}>${inner}</${tag}>`;
}

function renderBlock(b){
  switch(b.type){

    case 'intro':
      return `<div class="block-intro"><p>${b.text}</p></div>`;

    case 'para':
      return `<p class="block-para">${b.text}</p>`;

    case 'quote':
      return `<div class="block-quote">
        <blockquote>${b.text}</blockquote>
        <cite>— ${b.attr}</cite>
      </div>`;

    case 'specs':
      return `<div>
        <div class="block-label">${b.heading}</div>
        <div class="specs-table">
          ${b.items.map(it=>`
            <div class="spec-row">
              <div class="spec-key">${it.k}</div>
              <div class="spec-val">${it.v}</div>
            </div>`).join('')}
        </div>
      </div>`;

    case 'panel':
      return `<div class="block-panel">
        <div class="block-label">${b.heading}</div>
        <p>${b.text}</p>
      </div>`;

    case 'threat_grid':
      return `<div>
        <div class="block-label">${b.heading}</div>
        <div class="threat-grid">
          ${b.items.map(it=>`
            <div class="threat-card">
              <div class="threat-code">${it.code}</div>
              <h4>${it.title}</h4>
              <p>${it.desc}</p>
            </div>`).join('')}
        </div>
      </div>`;

    case 'capability_grid':
      return `<div class="cap-grid">
        ${b.services.map(s=>`
          <div class="cap-card">
            <div class="cap-icon"><i class="ti ${s.icon}"></i></div>
            <div class="cap-name">${s.name}</div>
            <div class="cap-full">${s.full}</div>
            <p class="cap-desc">${s.desc}</p>
          </div>`).join('')}
      </div>`;

    case 'status_bar':
      return `<div class="status-bar">
        <div class="status-dot"></div>
        <span class="status-text">${b.text}</span>
      </div>`;

    case 'protocol':
      return `<div class="steps">
        ${b.steps.map((s,i)=>`
          <div class="step">
            <div class="step-aside">
              <div class="step-circle">${s.num}</div>
              ${i < b.steps.length-1 ? '<div class="step-line"></div>' : ''}
            </div>
            <div class="step-body">
              <h4>${s.title}</h4>
              <p>${s.desc}</p>
            </div>
          </div>`).join('')}
      </div>`;

    case 'edge_grid':
      return `<div class="edge-grid">
        ${b.items.map(it=>`
          <div class="edge-card">
            <div class="edge-icon-wrap"><i class="ti ${it.icon}"></i></div>
            <h4>${it.title}</h4>
            <p>${it.desc}</p>
          </div>`).join('')}
      </div>`;

    case 'roadmap':
      return `<div class="roadmap-list">
        ${b.cards.map(c=>`
          <div class="roadmap-card">
            <div class="roadmap-horizon">
              <div class="roadmap-t">${c.horizon}</div>
              <div class="roadmap-phase">${c.phase}</div>
            </div>
            <div class="roadmap-body">
              <h4>${c.title}</h4>
              <p>${c.desc}</p>
            </div>
          </div>`).join('')}
      </div>`;

    case 'segment_split':
      return `<div class="segment-grid">
        ${[b.left, b.right].map((col,j)=>`
          <div class="segment-card">
            <div class="segment-header">
              <span class="segment-label">${col.label}</span>
              <span class="segment-tag" style="background:${col.color}18;color:${col.color}">${j===0?'Segment A':'Segment B'}</span>
            </div>
            <p class="segment-headline">${col.headline}</p>
            <div>
              <div class="block-label">Challenge Surface</div>
              <ul class="problems-list">
                ${col.problems.map(p=>`
                  <li>
                    <div class="problem-dot" style="background:${col.color}"></div>
                    ${p}
                  </li>`).join('')}
              </ul>
            </div>
            <div class="mitigation-box" style="background:${col.color}0d;border:1px solid ${col.color}25">
              <div class="block-label" style="--accent:${col.color}">Mitigation Approach</div>
              <p>${col.solution}</p>
            </div>
            <div>
              <div class="block-label">Outcome</div>
              <p class="outcome-text">${col.outcome}</p>
            </div>
          </div>`).join('')}
      </div>`;

    case 'manifesto':
      return `<div class="manifesto"><p>${b.text}</p></div>`;

    case 'qa_domains':
      return `<div class="qa-domains">
        ${b.domains.map(d=>`
          <div class="qa-domain">
            <div class="qa-domain-hdr">
              <div class="qa-domain-icon" style="background:${d.color}18;color:${d.color}"><i class="ti ${d.icon}"></i></div>
              <div class="qa-domain-info">
                <h3>${d.label} <span style="font-weight:400;color:var(--text3)">·</span> ${d.full}</h3>
                <p>${d.desc}</p>
              </div>
              <span class="qa-domain-tag" style="background:${d.color}12;color:${d.color}">${d.questions.length} Qs</span>
            </div>
            ${d.questions.map(q=>`
              <details class="qa-item">
                <summary class="qa-q">
                  <span class="qa-num">${q.num}</span>
                  <span class="qa-q-text">${q.q}</span>
                  <i class="ti ti-plus qa-icon"></i>
                </summary>
                <div class="qa-a">
                  <div class="qa-label">Vedant Responds</div>
                  <p>${q.a}</p>
                </div>
              </details>`).join('')}
          </div>`).join('')}
      </div>`;

    default: return '';
  }
}

// ─── SECTION RENDER ───────────────────────────────────────────────────────

function renderSection(s, idx){
  const prev = SECTIONS[idx-1];
  const next = SECTIONS[idx+1];
  const dots = SECTIONS.map((sec,i)=>`<div class="dot ${sec.id===s.id?'active':''}" data-section="${sec.id}"></div>`).join('');
  const prevBtn = prev ? `<button class="nav-btn-prev" data-section="${prev.id}"><i class="ti ti-arrow-left"></i>${prev.nav}</button>` : `<div></div>`;
  const nextBtn = next
    ? `<button class="nav-btn-next" data-section="${next.id}">${next.nav}<i class="ti ti-arrow-right"></i></button>`
    : `<div class="nav-end"><i class="ti ti-circle-check"></i>End of brief</div>`;

  return `
    <div class="section-enter">
      <div class="section-eyebrow">
        <div class="section-badge"><i class="ti ti-files"></i>Reference Brief</div>
        <span class="section-num-label">${s.num} / 08</span>
      </div>
      <h1 class="section-title">${s.title}</h1>
      <p class="section-subtitle">${s.subtitle}</p>
      <div class="section-divider"></div>
      <div class="blocks">${s.content.map(renderBlock).join('')}</div>
      <div class="nav-footer">
        ${prevBtn}
        <div class="progress-dots">${dots}</div>
        ${nextBtn}
      </div>
    </div>`;
}

// ─── STATE & ROUTING ──────────────────────────────────────────────────────

let active = 'who';

function setActive(id){
  active = id;
  const idx = SECTIONS.findIndex(s=>s.id===id);
  document.getElementById('sidebar').innerHTML = renderSidebar(active);
  document.getElementById('content').innerHTML = renderSection(SECTIONS[idx], idx);
  document.getElementById('content-area').scrollTop = 0;
  closeMenu();
}

function toggleMenu(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeMenu(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// Event delegation
